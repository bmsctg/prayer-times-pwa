<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b5e3a" />
  <title>Prayer Times – Sweden</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Prayer Times</h1>
    <p id="date-today" class="date-line">—</p>
    <p id="hijri-date" class="hijri-line">—</p>
  </header>

  <div class="settings-bar">
    <select id="place-select" aria-label="Place">
      <option value="stockholm" selected>Stockholm</option>
      <option value="gothenburg">Gothenburg</option>
    </select>
    <select id="source-select" aria-label="Source">
      <option value="ifis" selected>Islamiska Förbundet</option>
      <option value="aladhan">Aladhan API</option>
    </select>
  </div>

  <div id="next-prayer-banner" class="next-prayer-banner" style="display:none">
    <span id="banner-label" class="banner-label">Next Prayer</span>
    <div class="banner-body">
      <span id="banner-prayer-name" class="banner-name">—</span>
      <span id="banner-prayer-at" class="banner-at"></span>
    </div>
    <div id="banner-countdown" class="banner-countdown">—</div>
  </div>

  <ul id="prayer-times"></ul>

  <div class="day-nav">
    <button type="button" id="prev-day-btn" class="nav-btn" disabled aria-label="Previous day">&#8249;</button>
    <button type="button" id="today-btn" class="nav-btn nav-btn--today" disabled>Today</button>
    <button type="button" id="next-day-btn" class="nav-btn" aria-label="Next day">&#8250;</button>
  </div>

  <div class="notify-card">
    <label class="notify-toggle">
      <input type="checkbox" id="notify-check" />
      <span class="notify-label">Notify me at prayer time</span>
    </label>
    <p id="notify-status" class="notify-status"></p>
  </div>

  <div class="qibla-card">
    <p id="qibla-text" class="qibla-text"></p>
    <a href="https://qiblafinder.withgoogle.com/" target="_blank" rel="noopener" class="qibla-btn">Open Qibla Finder</a>
  </div>

  <footer class="copyright">
    &copy; 2026 BMS. All rights reserved.
  </footer>

  <script src="app.js"></script>
</body>
</html>
