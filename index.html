<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b5e3a" />
  <title>Prayer Times – Sweden</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Prayer Times</h1>
    <p id="date-today" class="date-line">—</p>
    <p id="hijri-date" class="hijri-line">—</p>
  </header>

  <div class="settings-bar">
    <select id="place-select" aria-label="Place">
      <option value="vasterhaninge" selected>Västerhaninge</option>
      <option value="stockholm">Stockholm</option>
      <option value="gothenburg">Gothenburg</option>
    </select>
    <select id="source-select" aria-label="Source">
      <option value="ifis" selected>Islamiska Förbundet</option>
      <option value="aladhan">Aladhan API</option>
    </select>
  </div>

  <ul id="prayer-times"></ul>

  <div class="day-nav">
    <button type="button" id="prev-day-btn" class="nav-btn" disabled aria-label="Previous day">&#8249;</button>
    <button type="button" id="today-btn" class="nav-btn nav-btn--today" disabled>Today</button>
    <button type="button" id="next-day-btn" class="nav-btn" aria-label="Next day">&#8250;</button>
  </div>

  <div class="qibla-card">
    <p id="qibla-text" class="qibla-text"></p>
    <a href="https://qiblafinder.withgoogle.com/" target="_blank" rel="noopener" class="qibla-btn">Open Qibla Finder</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
